<!DOCTYPE html>
<html>
<head>
    <title>Delete Student</title>
</head>
<body>

<h2>Are you sure you want to delete this student?</h2>

<p>Name: {{ student.name }}</p>
<p>Email: {{ student.email }}</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<br>

<a href="{% url 'home' %}">Cancel</a>

</body>
</html>
